<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>list-mouvements</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="header/header :: headerFragment"></div>
<div class="main-content">
    <div class="contanier-add-produit">
        <h2>list-mouvements</h2>
        <a href="/mouvements/new" >Ajouter Mouvement </a>
    </div>
    <table border="1" style="border-collapse: collapse;width: 100% ">
        <thead>
        <tr>
            <th>Date</th>
            <th>Produit</th>
            <th>Type</th>
            <th>Quantité</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${mouvements}">
            <td th:text="${#temporals.format(m.date, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${m.produit.nom}"></td>
            <td>
                <span th:class="${m.type == 'ENTREE' ? 'badge bg-success' : 'badge bg-danger'}"
                      th:text="${m.type}"></span>
            </td>
            <td th:text="${m.quantite}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
